<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" fill="none">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d0905"/>
      <stop offset="1" stop-color="#140f0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1090 210) rotate(120) scale(600)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientTransform="translate(150 730) rotate(-45) scale(540)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#84cc16" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#84cc16" stop-opacity="0"/>
    </radialGradient>

    <!-- Area Chart Gradient -->
    <linearGradient id="chart-area-grad" x1="0" y1="160" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow-amber" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Dot Pattern -->
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bg)"/>
  <rect width="1400" height="800" fill="url(#dots)"/>
  <rect width="1400" height="800" fill="url(#glow)"/>
  <rect width="1400" height="800" fill="url(#glow2)"/>

  <!-- Market Area Chart (Right Side Visual - AI insights) -->
  <g>
    <!-- Chart Grid Lines -->
    <line x1="880" y1="160" x2="1260" y2="160" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1.5"/>
    <line x1="880" y1="210" x2="1260" y2="210" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1.5"/>
    <line x1="880" y1="260" x2="1260" y2="260" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1.5"/>
    <line x1="880" y1="310" x2="1260" y2="310" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1.5"/>
    <line x1="880" y1="360" x2="1260" y2="360" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

    <!-- Chart Gradient Filled Area -->
    <path d="M 880 340 
             C 905 315, 905 295, 930 290 
             C 955 285, 955 315, 980 310 
             C 1005 305, 1005 255, 1030 250 
             C 1055 245, 1055 275, 1080 270 
             C 1110 265, 1110 205, 1140 200 
             C 1170 195, 1170 225, 1200 220 
             C 1230 215, 1235 165, 1260 160 
             L 1260 360 L 880 360 Z" 
          fill="url(#chart-area-grad)"/>

    <!-- Glowing Trendline -->
    <path d="M 880 340 
             C 905 315, 905 295, 930 290 
             C 955 285, 955 315, 980 310 
             C 1005 305, 1005 255, 1030 250 
             C 1055 245, 1055 275, 1080 270 
             C 1110 265, 1110 205, 1140 200 
             C 1170 195, 1170 225, 1200 220 
             C 1230 215, 1235 165, 1260 160" 
          fill="none" stroke="#fbbf24" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-amber)"/>

    <!-- Key Inflection Points -->
    <circle cx="880" cy="340" r="5" fill="#fcd34d"/>
    <circle cx="980" cy="310" r="5" fill="#fcd34d"/>
    <circle cx="1080" cy="270" r="5" fill="#fcd34d"/>
    <circle cx="1200" cy="220" r="5" fill="#fcd34d"/>

    <!-- Pulsing Peak Node -->
    <circle cx="1260" cy="160" r="10" fill="#fbbf24" fill-opacity="0.3" filter="url(#glow-amber)"/>
    <circle cx="1260" cy="160" r="5" fill="#fbbf24" filter="url(#glow-amber)"/>
    <circle cx="1260" cy="160" r="2" fill="#ffffff"/>

    <!-- Peak Metric Tooltip -->
    <g transform="translate(1225, 108)">
      <rect width="70" height="22" rx="4" fill="#10b981" stroke="#34d399" stroke-width="1" filter="url(#glow-green)"/>
      <text x="35" y="14" font-family="sans-serif" font-size="8.5" font-weight="bold" fill="#ffffff" text-anchor="middle">+12.4%</text>
      <polygon points="31,22 39,22 35,26" fill="#10b981"/>
    </g>
  </g>

  <!-- AI Curated News Card (Bottom-Left - Backend) -->
  <g transform="translate(880, 390)">
    <rect width="240" height="120" rx="10" fill="#1c160e" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.4" filter="url(#glow-amber)"/>
    
    <!-- Bullish Sentiment Badge -->
    <rect x="15" y="16" width="56" height="15" rx="3.5" fill="#10b981" fill-opacity="0.18" stroke="#10b981" stroke-opacity="0.4" stroke-width="1"/>
    <text x="43" y="26" font-family="sans-serif" font-weight="bold" font-size="7.5" fill="#34d399" text-anchor="middle" letter-spacing="0.5">BULLISH</text>
    
    <!-- Card Title -->
    <text x="15" y="52" font-family="sans-serif" font-weight="bold" font-size="11" fill="#ffffff">Apple Stock Rallies after Keynote</text>
    
    <!-- Article Text Representation Lines -->
    <rect x="15" y="68" width="210" height="4" rx="2" fill="#94a3b8" fill-opacity="0.4"/>
    <rect x="15" y="78" width="190" height="4" rx="2" fill="#94a3b8" fill-opacity="0.4"/>
    <rect x="15" y="88" width="130" height="4" rx="2" fill="#94a3b8" fill-opacity="0.4"/>

    <!-- Data source marker -->
    <text x="15" y="106" font-family="monospace" font-size="7.5" fill="#fbbf24" opacity="0.8">Express.js API server</text>
  </g>

  <!-- PostgreSQL Database Status Badge (Bottom-Right - Database) -->
  <g transform="translate(1140, 390)">
    <rect width="120" height="42" rx="6" fill="#140f09" stroke="#fbbf24" stroke-width="1.2" stroke-opacity="0.35"/>
    
    <!-- Database Icon -->
    <ellipse cx="22" cy="17" rx="8.5" ry="3.5" fill="none" stroke="#fcd34d" stroke-width="1.5"/>
    <path d="M 13.5 17 V 22 A 8.5 3.5 0 0 0 30.5 22 V 17" fill="none" stroke="#fcd34d" stroke-width="1.5"/>
    <path d="M 13.5 22 V 27 A 8.5 3.5 0 0 0 30.5 27 V 22" fill="none" stroke="#fcd34d" stroke-width="1.5"/>
    
    <!-- Database Metadata Text -->
    <text x="38" y="20" font-family="Consolas, Monaco, monospace" font-size="7.5" fill="#fcd34d" font-weight="bold">POSTGRES DB</text>
    <text x="38" y="31" font-family="Consolas, Monaco, monospace" font-size="7.5" fill="#10b981" font-weight="bold">INDEXED: OK</text>
  </g>

  <!-- Typography (Left Section) -->
  <text x="90" y="560" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="600" fill="#f59e0b" letter-spacing="6">03 — AI FINANCIAL NEWS PLATFORM</text>
  <text x="86" y="670" font-family="Inter, Segoe UI, sans-serif" font-size="140" font-weight="800" fill="#ffffff" letter-spacing="-2">Fintakes</text>
  <text x="92" y="726" font-family="Inter, Segoe UI, sans-serif" font-size="30" fill="#94a3b8">AI Retrieval · Express.js · PostgreSQL</text>
</svg>
