<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1020"/><stop offset="1" stop-color="#0a0d18"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1080 210) rotate(120) scale(620)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1" stop-opacity="0.55"/><stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientTransform="translate(160 720) rotate(-45) scale(520)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8" stop-opacity="0.28"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1400" height="800" fill="url(#bg)"/>
  <rect width="1400" height="800" fill="url(#dots)"/>
  <rect width="1400" height="800" fill="url(#glow)"/>
  <rect width="1400" height="800" fill="url(#glow2)"/>

  <!-- Relevant: agent unifying an ERP database + knowledge graph (RAG) -->
  <g stroke="#818cf8" stroke-opacity="0.55" stroke-width="2.5" fill="none">
    <line x1="1040" y1="250" x2="1040" y2="150"/>
    <line x1="1040" y1="250" x2="920" y2="330"/>
    <line x1="1040" y1="250" x2="1170" y2="330"/>
    <line x1="1040" y1="250" x2="1170" y2="180"/>
  </g>
  <!-- central agent node -->
  <circle cx="1040" cy="250" r="30" fill="#6366f1"/>
  <circle cx="1040" cy="250" r="30" fill="none" stroke="#c7d2fe" stroke-opacity="0.6" stroke-width="2"/>
  <circle cx="1040" cy="250" r="9" fill="#e0e7ff"/>

  <!-- ERP database cylinder -->
  <g stroke="#c7d2fe" stroke-width="2.5" fill="#818cf8" fill-opacity="0.18">
    <ellipse cx="920" cy="356" rx="46" ry="16"/>
    <path d="M874 356 v46 a46 16 0 0 0 92 0 v-46" />
    <ellipse cx="920" cy="356" rx="46" ry="16" fill="#0b1020" fill-opacity="0.35"/>
  </g>

  <!-- knowledge / graph nodes -->
  <g fill="#c7d2fe">
    <circle cx="1170" cy="330" r="12"/>
    <circle cx="1170" cy="180" r="12"/>
    <circle cx="1040" cy="150" r="10"/>
  </g>
  <g fill="#818cf8">
    <rect x="1150" y="312" width="14" height="4" rx="2"/><rect x="1150" y="322" width="10" height="4" rx="2"/>
    <rect x="1150" y="162" width="14" height="4" rx="2"/><rect x="1150" y="172" width="10" height="4" rx="2"/>
  </g>

  <text x="90" y="560" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="600" fill="#818cf8" letter-spacing="6">01 — ENTERPRISE DATA AGENT</text>
  <text x="86" y="670" font-family="Inter, Segoe UI, sans-serif" font-size="150" font-weight="800" fill="#ffffff" letter-spacing="-2">Lobo</text>
  <text x="92" y="726" font-family="Inter, Segoe UI, sans-serif" font-size="30" fill="#94a3b8">LangChain · MCP · RAG · Epicor ERP</text>
</svg>
