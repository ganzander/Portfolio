<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" fill="none">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050814"/>
      <stop offset="1" stop-color="#0a0d24"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1050 240) rotate(120) scale(600)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientTransform="translate(160 720) rotate(-45) scale(520)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <!-- Connectors Gradients -->
    <linearGradient id="line-erp-to-core" x1="880" y1="290" x2="1050" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="line-graph-to-core" x1="1200" y1="240" x2="1050" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow-indigo" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Dot Pattern -->
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bg)"/>
  <rect width="1400" height="800" fill="url(#dots)"/>
  <rect width="1400" height="800" fill="url(#glow)"/>
  <rect width="1400" height="800" fill="url(#glow2)"/>

  <!-- Connection Pipelines -->
  <g stroke-width="3" fill="none">
    <!-- ERP to Core -->
    <path d="M 916 295 Q 980 255 1018 245" stroke="url(#line-erp-to-core)"/>
    <!-- Knowledge Graph to Core -->
    <line x1="1166" y1="240" x2="1090" y2="240" stroke="url(#line-graph-to-core)"/>
  </g>

  <!-- HUD text labels along connections -->
  <text x="965" y="260" font-family="Consolas, Monaco, monospace" font-size="8" fill="#38bdf8" font-weight="bold" opacity="0.8" transform="rotate(-18, 965, 260)">MCP PROTOCOL</text>
  <text x="1128" y="233" font-family="Consolas, Monaco, monospace" font-size="8" fill="#818cf8" font-weight="bold" opacity="0.8" text-anchor="middle">RAG FETCH</text>

  <!-- Epicor ERP Database Cylinder (Left) -->
  <g>
    <!-- Outer Glow for Database -->
    <ellipse cx="880" cy="290" rx="38" ry="15" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.1" filter="url(#glow-blue)"/>
    
    <!-- Cylinder Base -->
    <path d="M 844 290 V 340 A 36 14 0 0 0 916 340 V 290" fill="#0f172a" fill-opacity="0.4" stroke="#38bdf8" stroke-width="2.5"/>
    
    <!-- Glowing Disks (representing database platters) -->
    <ellipse cx="880" cy="290" rx="36" ry="14" fill="#0a0f1d" stroke="#38bdf8" stroke-width="2.5"/>
    <ellipse cx="880" cy="308" rx="36" ry="14" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.6" stroke-dasharray="5 3"/>
    <ellipse cx="880" cy="324" rx="36" ry="14" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.6"/>
    
    <!-- Central Data Beam -->
    <line x1="880" y1="272" x2="880" y2="348" stroke="#e0f7fa" stroke-width="2" opacity="0.8" filter="url(#glow-blue)"/>
    
    <!-- Data Access Led indicator -->
    <circle cx="880" cy="290" r="3" fill="#38bdf8" filter="url(#glow-blue)"/>

    <!-- ERP Label -->
    <rect x="845" y="360" width="70" height="15" rx="3" fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1"/>
    <text x="880" y="370" font-family="sans-serif" font-size="8" fill="#38bdf8" font-weight="bold" text-anchor="middle" letter-spacing="0.5">EPICOR ERP</text>
  </g>

  <!-- central LangChain agent node (Center) -->
  <g>
    <!-- Concentric Tech Rings -->
    <circle cx="1050" cy="240" r="60" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="6 8"/>
    <circle cx="1050" cy="240" r="48" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Inner Core Circle -->
    <circle cx="1050" cy="240" r="34" fill="#0d1127" stroke="#6366f1" stroke-width="3" filter="url(#glow-indigo)"/>
    
    <!-- Central intelligence diamond (Agent core) -->
    <polygon points="1050,224 1063,240 1050,256 1037,240" fill="#c7d2fe" filter="url(#glow-indigo)"/>
    
    <!-- Core orbiting data points -->
    <circle cx="1008" cy="210" r="3.5" fill="#6366f1"/>
    <circle cx="1092" cy="270" r="3.5" fill="#38bdf8"/>

    <!-- Agent Label -->
    <rect x="1015" y="155" width="70" height="15" rx="3" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="1050" y="165" font-family="sans-serif" font-size="8" fill="#818cf8" font-weight="bold" text-anchor="middle" letter-spacing="0.5">AGENT CORE</text>
  </g>

  <!-- Knowledge / Graph Nodes (Right) -->
  <g>
    <!-- Connections -->
    <line x1="1200" y1="180" x2="1160" y2="240" stroke="#818cf8" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="1200" y1="180" x2="1240" y2="250" stroke="#818cf8" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="1160" y1="240" x2="1200" y2="310" stroke="#818cf8" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="1240" y1="250" x2="1200" y2="310" stroke="#818cf8" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="1160" y1="240" x2="1240" y2="250" stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="2 2"/>

    <!-- Node A (Document RAG) -->
    <circle cx="1200" cy="180" r="15" fill="#0d1127" stroke="#818cf8" stroke-width="2" filter="url(#glow-indigo)"/>
    <g transform="translate(1193, 173)">
      <path d="M2 1 H10 L12 3 V13 H2 Z" fill="none" stroke="#c7d2fe" stroke-width="1.5"/>
      <line x1="4" y1="5" x2="8" y2="5" stroke="#c7d2fe" stroke-width="1"/>
      <line x1="4" y1="8" x2="10" y2="8" stroke="#c7d2fe" stroke-width="1"/>
      <line x1="4" y1="11" x2="7" y2="11" stroke="#c7d2fe" stroke-width="1"/>
    </g>

    <!-- Node B (Vector Data) -->
    <circle cx="1160" cy="240" r="14" fill="#0d1127" stroke="#38bdf8" stroke-width="2" filter="url(#glow-blue)"/>
    <g transform="translate(1154, 234)">
      <polygon points="6,2 10,4 6,6 2,4" fill="none" stroke="#a5f3fc" stroke-width="1"/>
      <polygon points="6,6 10,8 6,10 2,8" fill="none" stroke="#a5f3fc" stroke-width="1"/>
      <line x1="6" y1="2" x2="6" y2="10" stroke="#a5f3fc" stroke-width="1"/>
    </g>

    <!-- Node C (Semantic Link) -->
    <circle cx="1240" cy="250" r="12" fill="#0d1127" stroke="#6366f1" stroke-width="2"/>
    <circle cx="1240" cy="250" r="3" fill="#c7d2fe"/>

    <!-- Node D (Embedding Core) -->
    <circle cx="1200" cy="310" r="15" fill="#0d1127" stroke="#a5f3fc" stroke-width="2" filter="url(#glow-blue)"/>
    <!-- Tiny query loops inside -->
    <circle cx="1200" cy="310" r="5" fill="none" stroke="#a5f3fc" stroke-width="1.5"/>

    <!-- Knowledge Graph Label -->
    <rect x="1160" y="340" width="80" height="15" rx="3" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1"/>
    <text x="1200" y="350" font-family="sans-serif" font-size="8" fill="#818cf8" font-weight="bold" text-anchor="middle" letter-spacing="0.5">RAG GRAPH</text>
  </g>

  <!-- Floating MCP Terminal Console (Bottom-Right Area) -->
  <g transform="translate(950, 395)">
    <!-- Terminal Panel -->
    <rect width="250" height="96" rx="8" fill="#070a15" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.45" filter="url(#glow-indigo)"/>
    
    <!-- Console dots -->
    <circle cx="16" cy="16" r="4" fill="#ef4444"/>
    <circle cx="28" cy="16" r="4" fill="#fbbf24"/>
    <circle cx="40" cy="16" r="4" fill="#22c55e"/>
    
    <!-- Title -->
    <text x="125" y="19" font-family="Consolas, Monaco, monospace" font-size="9" fill="#94a3b8" text-anchor="middle">mcp_server_epicor.py</text>
    
    <!-- Console Content -->
    <g font-family="Consolas, Monaco, monospace" font-size="9.5" font-weight="500">
      <text x="16" y="44" fill="#38bdf8">&gt; call_mcp_tool("query_ap", vendor="Epicor")</text>
      <text x="16" y="62" fill="#a5f3fc">[RAG] Scanning knowledge graph (AP/AR)...</text>
      <text x="16" y="80" fill="#22c55e">[Agent] Found $14,250 unpaid invoices.</text>
    </g>
  </g>

  <!-- Typography (Left Section) -->
  <text x="90" y="560" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="600" fill="#818cf8" letter-spacing="6">01 — ENTERPRISE DATA AGENT</text>
  <text x="86" y="670" font-family="Inter, Segoe UI, sans-serif" font-size="150" font-weight="800" fill="#ffffff" letter-spacing="-2">Lobo</text>
  <text x="92" y="726" font-family="Inter, Segoe UI, sans-serif" font-size="30" fill="#94a3b8">LangChain · FastAPI · PostgreSQL</text>
</svg>
