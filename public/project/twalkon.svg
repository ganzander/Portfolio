<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" fill="none">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0512"/>
      <stop offset="1" stop-color="#140a24"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1060 275) rotate(120) scale(600)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientTransform="translate(150 730) rotate(-45) scale(540)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ec4899" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>

    <!-- Heart Gradient -->
    <linearGradient id="heart-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Node Connection Gradients -->
    <linearGradient id="line-1" x1="1060" y1="275" x2="920" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="line-2" x1="1060" y1="275" x2="1200" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="line-3" x1="1060" y1="275" x2="900" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="line-4" x1="1060" y1="275" x2="1220" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-pink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Dot Pattern -->
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bg)"/>
  <rect width="1400" height="800" fill="url(#dots)"/>
  <rect width="1400" height="800" fill="url(#glow)"/>
  <rect width="1400" height="800" fill="url(#glow2)"/>

  <!-- Network Connection Lines -->
  <g stroke-width="2.5" fill="none">
    <path d="M 1060 275 Q 990 220 920 180" stroke="url(#line-1)"/>
    <path d="M 1060 275 Q 1130 220 1200 180" stroke="url(#line-2)"/>
    <path d="M 1060 275 Q 980 320 900 360" stroke="url(#line-3)"/>
    <path d="M 1060 275 Q 1140 320 1220 360" stroke="url(#line-4)"/>
  </g>

  <!-- Glowing Particles along connections -->
  <g fill="#ffffff" filter="url(#glow-pink)">
    <circle cx="990" cy="228" r="4.5" opacity="0.8"/>
    <circle cx="1130" cy="228" r="4.5" opacity="0.8"/>
    <circle cx="980" cy="318" r="4.5" opacity="0.8"/>
    <circle cx="1140" cy="318" r="4.5" opacity="0.8"/>
  </g>

  <!-- Floating Stripe Payment Card (Backend) -->
  <g transform="translate(1120, 80) rotate(8)">
    <!-- Card Base -->
    <rect width="130" height="82" rx="8" fill="#635bff" filter="url(#glow-purple)" opacity="0.9"/>
    <!-- Chip -->
    <rect x="12" y="24" width="18" height="13" rx="2" fill="#ffd700" fill-opacity="0.9"/>
    <!-- Card Lines -->
    <rect x="12" y="48" width="60" height="4" rx="1" fill="#ffffff" fill-opacity="0.4"/>
    <rect x="12" y="56" width="40" height="4" rx="1" fill="#ffffff" fill-opacity="0.4"/>
    <!-- Stripe Logo symbol -->
    <path d="M 104 22 C 102 22 101 23 101 24.5 C 101 27 105 26.5 105 29 C 105 31 103 31.5 101.5 31.5 C 100 31.5 99 30.8 99 30 L 100.8 30 C 100.8 30.5 101.2 30.8 101.5 30.8 C 102.5 30.8 103 30.2 103 29.2 C 103 26.8 99 27.2 99 24.5 C 99 22.5 101 22 102.5 22 C 103.8 22 104.8 22.8 104.8 23.5 L 103 23.5 C 103 23.2 102.8 22.8 102.4 22.8 Z" fill="#ffffff" stroke="#ffffff" stroke-width="0.8"/>
    <rect x="101" y="42" width="16" height="16" rx="8" fill="#ffffff" fill-opacity="0.25"/>
    <rect x="109" y="42" width="16" height="16" rx="8" fill="#ffffff" fill-opacity="0.25"/>
    <text x="12" y="16" font-family="monospace" font-size="8" fill="#ffffff" fill-opacity="0.7" letter-spacing="1">PREMIUM</text>
  </g>

  <!-- Central Parenting AI Core Node (AI Engine) -->
  <g>
    <!-- Outer Rings -->
    <circle cx="1060" cy="275" r="75" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="6 8"/>
    <circle cx="1060" cy="275" r="60" stroke="#a855f7" stroke-width="2" stroke-opacity="0.4"/>
    <circle cx="1060" cy="275" r="48" fill="#0f0926" stroke="#c084fc" stroke-width="2.5" filter="url(#glow-purple)"/>
    
    <!-- Heart Path (AI matching/moderation indicator) -->
    <path d="M 1060 294 C 1045 281, 1037 271, 1037 260 A 11 11 0 0 1 1060 254 A 11 11 0 0 1 1083 260 C 1083 271, 1075 281, 1060 294 Z" 
          fill="url(#heart-grad)" filter="url(#glow-pink)"/>

    <!-- AI Core Label -->
    <rect x="1025" y="185" width="70" height="15" rx="3" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1"/>
    <text x="1060" y="195" font-family="sans-serif" font-size="8" fill="#c084fc" font-weight="bold" text-anchor="middle" letter-spacing="0.5">AI ENGINE</text>
  </g>

  <!-- Member Avatars -->
  
  <!-- Node 1: Mother & Baby (Top-Left) -->
  <g>
    <circle cx="920" cy="180" r="34" fill="#0f0926" stroke="#f472b6" stroke-width="2.5" filter="url(#glow-pink)"/>
    <g transform="translate(920, 180)">
      <circle cx="-4" cy="-8" r="7.5" fill="#fdf2f8"/>
      <path d="M -16 16 C -16 3, 5 3, 5 16 Z" fill="#fdf2f8"/>
      <circle cx="7" cy="1" r="5" fill="#fce7f3"/>
      <path d="M 0 16 C 0 8, 14 8, 14 16 Z" fill="#fce7f3"/>
    </g>
    <!-- Tag -->
    <rect x="885" y="222" width="70" height="15" rx="3" fill="#f472b6" fill-opacity="0.15" stroke="#f472b6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="920" y="232" font-family="sans-serif" font-size="8" fill="#f472b6" font-weight="bold" text-anchor="middle" letter-spacing="0.5">PARENT</text>
  </g>

  <!-- Node 2: Father & Child (Top-Right) -->
  <g>
    <circle cx="1200" cy="180" r="34" fill="#0f0926" stroke="#c084fc" stroke-width="2.5" filter="url(#glow-purple)"/>
    <g transform="translate(1200, 180)">
      <circle cx="-5" cy="-9" r="8" fill="#faf5ff"/>
      <path d="M -18 16 C -18 2, 4 2, 4 16 Z" fill="#faf5ff"/>
      <circle cx="8" cy="2" r="5" fill="#f3e8ff"/>
      <path d="M 1 16 C 1 9, 15 9, 15 16 Z" fill="#f3e8ff"/>
    </g>
    <!-- Tag -->
    <rect x="1165" y="222" width="70" height="15" rx="3" fill="#c084fc" fill-opacity="0.15" stroke="#c084fc" stroke-opacity="0.3" stroke-width="1"/>
    <text x="1200" y="232" font-family="sans-serif" font-size="8" fill="#c084fc" font-weight="bold" text-anchor="middle" letter-spacing="0.5">PARENT</text>
  </g>

  <!-- Node 3: Expert Coach (Bottom-Left) -->
  <g>
    <circle cx="900" cy="360" r="34" fill="#0f0926" stroke="#3b82f6" stroke-width="2.5" filter="url(#glow-purple)"/>
    <g transform="translate(900, 360)">
      <circle cx="0" cy="-7" r="8.5" fill="#eff6ff"/>
      <path d="M -14 16 C -14 4, 14 4, 14 16 Z" fill="#eff6ff"/>
      <path d="M -11 -7 A 11 11 0 0 1 11 -7" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
      <circle cx="-11" cy="-7" r="2.5" fill="#3b82f6"/>
      <path d="M -11 -7 L -6 -1" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    </g>
    <!-- Tag -->
    <rect x="865" y="402" width="70" height="15" rx="3" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="900" y="412" font-family="sans-serif" font-size="8" fill="#60a5fa" font-weight="bold" text-anchor="middle" letter-spacing="0.5">EXPERT COACH</text>
  </g>

  <!-- Node 4: Community Moderator (Bottom-Right) -->
  <g>
    <circle cx="1220" cy="360" r="34" fill="#0f0926" stroke="#ec4899" stroke-width="2.5" filter="url(#glow-pink)"/>
    <g transform="translate(1220, 360)">
      <circle cx="0" cy="-6" r="8.5" fill="#fdf2f8"/>
      <path d="M -14 16 C -14 5, 14 5, 14 16 Z" fill="#fdf2f8"/>
      <path d="M 0 -19 L 2 -14 L 7 -14 L 3 -11 L 5 -6 L 0 -9 L -5 -6 L -3 -11 L -7 -14 L -2 -14 Z" fill="#ffd700"/>
    </g>
    <!-- Tag -->
    <rect x="1185" y="402" width="70" height="15" rx="3" fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-opacity="0.3" stroke-width="1"/>
    <text x="1220" y="412" font-family="sans-serif" font-size="8" fill="#f472b6" font-weight="bold" text-anchor="middle" letter-spacing="0.5">MODERATOR</text>
  </g>

  <!-- Database & Auth Security Badge (Bottom-Left Area - Database) -->
  <g transform="translate(800, 460)">
    <rect width="130" height="38" rx="6" fill="#0f172a" fill-opacity="0.7" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
    <!-- PostgreSQL Cylinder Icon -->
    <ellipse cx="20" cy="15" rx="7" ry="3" fill="none" stroke="#10b981" stroke-width="1.2"/>
    <path d="M 13 15 V 20 A 7 3 0 0 0 27 20 V 15" fill="none" stroke="#10b981" stroke-width="1.2"/>
    <path d="M 13 20 V 25 A 7 3 0 0 0 27 25 V 20" fill="none" stroke="#10b981" stroke-width="1.2"/>
    <!-- Database/Auth Text -->
    <text x="34" y="19" font-family="sans-serif" font-size="8" font-weight="bold" fill="#3b82f6" letter-spacing="0.5">NODE.JS API</text>
    <text x="34" y="28" font-family="sans-serif" font-size="8" fill="#10b981" font-weight="bold" letter-spacing="0.5">SUPABASE DB</text>
  </g>

  <!-- Typography (Left Section) -->
  <text x="90" y="560" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="600" fill="#c084fc" letter-spacing="6">04 — PARENTING COMMUNITY PLATFORM</text>
  <text x="86" y="670" font-family="Inter, Segoe UI, sans-serif" font-size="140" font-weight="800" fill="#ffffff" letter-spacing="-2">TwalkOn</text>
  <text x="92" y="726" font-family="Inter, Segoe UI, sans-serif" font-size="30" fill="#94a3b8">AI Moderation · Node.js · Supabase DB</text>
</svg>
