    <line x1="1050" y1="360" x2="1050" y2="490" stroke="#a855f7"/>
    <line x1="1080" y1="380" x2="1080" y2="470" stroke="#e879f9"/>
    <line x1="1110" y1="398" x2="1110" y2="452" stroke="#e879f9"/>
    <line x1="1140" y1="374" x2="1140" y2="476" stroke="#e879f9"/>
    <line x1="1170" y1="402" x2="1170" y2="448" stroke="#f0abfc"/>
    <line x1="1200" y1="414" x2="1200" y2="436" stroke="#f0abfc"/>
