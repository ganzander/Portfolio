<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" fill="none">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#040b0b"/>
      <stop offset="1" stop-color="#071816"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1060 170) rotate(120) scale(600)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientTransform="translate(150 730) rotate(-45) scale(540)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4ade80" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>

    <!-- Connectors Gradients -->
    <linearGradient id="line-left" x1="1060" y1="180" x2="953" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="line-mid" x1="1060" y1="180" x2="1060" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="line-right" x1="1060" y1="180" x2="1167" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow-teal" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Dot Pattern -->
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bg)"/>
  <rect width="1400" height="800" fill="url(#dots)"/>
  <rect width="1400" height="800" fill="url(#glow)"/>
  <rect width="1400" height="800" fill="url(#glow2)"/>

  <!-- Stateful Graph Routing Pipelines (Orchestrator to Worker) -->
  <g stroke-width="2.5" fill="none">
    <path d="M 1060 178 Q 1000 220 953 270" stroke="url(#line-left)"/>
    <line x1="1060" y1="178" x2="1060" y2="270" stroke="url(#line-mid)"/>
    <path d="M 1060 178 Q 1120 220 1167 270" stroke="url(#line-right)"/>
  </g>

  <!-- Flow Arrows (Indicates routing decisions) -->
  <g fill="#2dd4bf" filter="url(#glow-teal)">
    <polygon points="986,238 992,233 993,241" transform="rotate(-15, 986, 238)"/>
    <polygon points="1134,238 1127,241 1128,233" transform="rotate(15, 1134, 238)"/>
  </g>

  <!-- Central Orchestrator Agent Node (Top) -->
  <g>
    <!-- Outer spinning radar rings -->
    <circle cx="1060" cy="170" r="54" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="6 8"/>
    <circle cx="1060" cy="170" r="42" stroke="#5eead4" stroke-width="2" stroke-opacity="0.3"/>
    
    <!-- Central Hexagon Core -->
    <polygon points="1060,142 1086,156 1086,184 1060,198 1034,184 1034,156" fill="#041a18" stroke="#2dd4bf" stroke-width="3" filter="url(#glow-teal)"/>
    
    <!-- Core Indicator Light -->
    <circle cx="1060" cy="170" r="8" fill="#5eead4" filter="url(#glow-teal)"/>
    
    <!-- HUD text tag -->
    <rect x="1010" y="98" width="100" height="15" rx="3" fill="#2dd4bf" fill-opacity="0.12" stroke="#2dd4bf" stroke-opacity="0.25" stroke-width="1"/>
    <text x="1060" y="108" font-family="sans-serif" font-size="7.5" fill="#2dd4bf" font-weight="bold" text-anchor="middle" letter-spacing="0.5">ORCHESTRATOR</text>
  </g>

  <!-- Specialized Worker Agent Cards (Middle) -->
  
  <!-- Worker 1: Product Search Agent -->
  <g>
    <rect x="910" y="270" width="86" height="66" rx="8" fill="#041a18" stroke="#2dd4bf" stroke-width="2.5" filter="url(#glow-teal)"/>
    <!-- Magnifying Glass Icon -->
    <g transform="translate(945, 280)" stroke="#5eead4" stroke-width="2" fill="none">
      <circle cx="7" cy="7" r="5"/>
      <line x1="11" y1="11" x2="16" y2="16"/>
    </g>
    <text x="953" y="322" font-family="sans-serif" font-weight="bold" font-size="8.5" fill="#5eead4" text-anchor="middle" letter-spacing="0.5">PRODUCTS</text>
  </g>

  <!-- Worker 2: Order Tracking Agent -->
  <g>
    <rect x="1017" y="270" width="86" height="66" rx="8" fill="#041a18" stroke="#2dd4bf" stroke-width="2.5" filter="url(#glow-teal)"/>
    <!-- Delivery Box Icon -->
    <g transform="translate(1052, 280)" stroke="#5eead4" stroke-width="1.8" fill="none">
      <polygon points="8,2 15,5 8,8 1,5"/>
      <line x1="8" y1="8" x2="8" y2="16"/>
      <path d="M 1 5 V 13 L 8 16"/>
      <path d="M 15 5 V 13 L 8 16"/>
    </g>
    <text x="1060" y="322" font-family="sans-serif" font-weight="bold" font-size="8.5" fill="#5eead4" text-anchor="middle" letter-spacing="0.5">TRACKING</text>
  </g>

  <!-- Worker 3: Refunds & Exchanges Agent -->
  <g>
    <rect x="1124" y="270" width="86" height="66" rx="8" fill="#041a18" stroke="#2dd4bf" stroke-width="2.5" filter="url(#glow-teal)"/>
    <!-- Return Arrow / Coin Icon -->
    <g transform="translate(1160, 282)" stroke="#5eead4" stroke-width="1.8" fill="none">
      <path d="M 1 8 A 6 6 0 1 1 12 11" stroke-linecap="round"/>
      <polyline points="10,13 13,11 10,9"/>
    </g>
    <text x="1167" y="322" font-family="sans-serif" font-weight="bold" font-size="8.5" fill="#5eead4" text-anchor="middle" letter-spacing="0.5">REFUNDS</text>
  </g>

  <!-- Floating Customer Chat Panel (WebSocket Live-Streaming Preview - Backend) -->
  <g transform="translate(910, 380)">
    <!-- Chat Card Panel -->
    <rect width="230" height="96" rx="10" fill="#031412" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.35" filter="url(#glow-teal)"/>
    
    <!-- User Icon -->
    <circle cx="24" cy="30" r="10" fill="#2dd4bf" fill-opacity="0.15" stroke="#2dd4bf" stroke-width="1"/>
    <circle cx="24" cy="27" r="3.5" fill="#5eead4"/>
    <path d="M 18 37 C 18 33, 30 33, 30 37 Z" fill="#5eead4"/>

    <!-- User Chat bubble -->
    <rect x="42" y="16" width="136" height="24" rx="6" fill="#092925"/>
    <text x="50" y="31" font-family="sans-serif" font-size="9" fill="#ffffff" font-weight="500">"Where is my order #1042?"</text>

    <!-- AI Live WebSocket stream bubble -->
    <circle cx="24" cy="74" r="4.5" fill="#4ade80" opacity="0.9" filter="url(#glow-green)"/>
    <circle cx="34" cy="74" r="4.5" fill="#4ade80" opacity="0.6"/>
    <circle cx="44" cy="74" r="4.5" fill="#4ade80" opacity="0.3"/>
    <text x="56" y="77" font-family="sans-serif" font-size="9" fill="#99f6e4" font-style="italic">Streaming response...</text>

    <!-- Streaming label -->
    <rect x="184" y="6" width="40" height="10" rx="2" fill="#ef4444" fill-opacity="0.2"/>
    <text x="204" y="14" font-family="monospace" font-weight="bold" font-size="6.5" fill="#f87171" text-anchor="middle">WS LIVE</text>
  </g>

  <!-- PostgreSQL Database Node (Database) -->
  <g transform="translate(1160, 380)">
    <!-- Card Base -->
    <rect width="50" height="52" rx="6" fill="#041a18" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.5" filter="url(#glow-teal)"/>
    <!-- Cylindrical Database Icon -->
    <ellipse cx="25" cy="16" rx="13" ry="5.5" fill="#031412" stroke="#5eead4" stroke-width="1.5"/>
    <path d="M 12 16 V 23 A 13 5.5 0 0 0 38 23 V 16" fill="none" stroke="#5eead4" stroke-width="1.5"/>
    <path d="M 12 23 V 30 A 13 5.5 0 0 0 38 30 V 23" fill="none" stroke="#5eead4" stroke-width="1.5"/>
    <ellipse cx="25" cy="23" rx="13" ry="5.5" fill="none" stroke="#5eead4" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="3 2"/>
    <text x="25" y="44" font-family="sans-serif" font-weight="bold" font-size="6.5" fill="#5eead4" text-anchor="middle" letter-spacing="0.5">POSTGRES</text>
  </g>

  <!-- Typography (Left Section) -->
  <text x="90" y="560" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="600" fill="#2dd4bf" letter-spacing="6">02 — MULTI-AGENT SUPPORT SYSTEM</text>
  <text x="86" y="670" font-family="Inter, Segoe UI, sans-serif" font-size="150" font-weight="800" fill="#ffffff" letter-spacing="-2">Kris</text>
  <text x="92" y="726" font-family="Inter, Segoe UI, sans-serif" font-size="30" fill="#94a3b8">LangGraph · FastAPI · PostgreSQL</text>
</svg>
